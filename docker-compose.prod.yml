version: "3.9"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_demo
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MYSQL_HOST=db
    command: sh -c "npx prisma migrate deploy && npm start"

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE: https://www.gokart-training.cloud   # <-- wstrzyknięcie API base podczas builda
      target: build
    depends_on:
      - server
    # już nie potrzebujesz volume, bo Nginx będzie serwował frontend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - server
      - client

volumes:
  db_data:
