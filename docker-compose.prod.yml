version: "3.9"
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_demo
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build: ./server
    env_file:
      - ./server/.env
    expose:
      - "4000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MYSQL_HOST=db
    command: sh -c "npx prisma migrate deploy && npm start"

  client:
    build: ./client
    command: npm run build
    volumes:
      - ./client/dist:/dist

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client/dist:/usr/share/nginx/html:ro
      # certyfikaty (jeśli używasz certbota)
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - server
      - client

volumes:
  db_data:
