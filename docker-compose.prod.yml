services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_demo
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: --innodb-buffer-pool-size=128M --max-allowed-packet=16M

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    env_file:
      - ./server/.env
    environment:
      - MYSQL_HOST=db
      - NODE_ENV=production
      - CLIENT_URL=https://app.gokart-training.cloud
      - NODE_OPTIONS=--max-old-space-size=128
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && npm run start"
    expose:
      - "4000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.server.rule=Host(`api.gokart-training.cloud`)"
      - "traefik.http.routers.server.entrypoints=websecure"
      - "traefik.http.routers.server.tls.certresolver=myresolver"
      - "traefik.http.services.server.loadbalancer.server.port=4000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE: "https://api.gokart-training.cloud"
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`app.gokart-training.cloud`)"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=myresolver"
      - "traefik.http.services.client.loadbalancer.server.port=80"
      - "traefik.http.routers.client-www.rule=Host(`www.app.gokart-training.cloud`)"
      - "traefik.http.routers.client-www.entrypoints=websecure"
      - "traefik.http.routers.client-www.tls.certresolver=myresolver"
      - "traefik.http.routers.client-www.middlewares=redirect-to-app"
      - "traefik.http.middlewares.redirect-to-app.redirectregex.regex=^https://www\\.app\\.gokart-training\\.cloud/(.*)"
      - "traefik.http.middlewares.redirect-to-app.redirectregex.replacement=https://app.gokart-training.cloud/$$1"
      - "traefik.http.middlewares.redirect-to-app.redirectregex.permanent=true"

  reverse-proxy:
    image: traefik:v2.10
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.myresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.myresolver.acme.email=piotrek789150@gmail.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

volumes:
  db_data:
  letsencrypt:
